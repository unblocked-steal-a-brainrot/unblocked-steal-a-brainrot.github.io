<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steal-a-Brainrot Unblocked - ألعاب مجانية</title>
    <meta name="description" content="أفضل الألعاب غير المحظورة (Unblocked Games) مجاناً على الإنترنت.">
    <style>
        :root {
            --primary: #6200ea;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #334155;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .thumbnail {
            width: 100%;
            height: 150px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Steal-a-Brainrot Unblocked</h1>
    <p>مجموعتك المفضلة من الألعاب السريعة والممتعة</p>
</header>

<div class="grid">
    <a href="link-to-game-1.html" class="game-card">
        <div class="thumbnail">🎮</div>
        <div class="info">
            <h3>Game Name 1</h3>
        </div>
    </a>

    <a href="link-to-game-2.html" class="game-card">
        <div class="thumbnail">🕹️</div>
        <div class="info">
            <h3>Game Name 2</h3>
        </div>
    </a>
</div>

</body>
</html>
